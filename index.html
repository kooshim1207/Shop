<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상품 페이지로 이동 중...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #03C75A;
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 36px 28px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .naver-logo {
      width: 56px; height: 56px;
      background: #03C75A;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 30px; font-weight: 900; color: #fff;
    }
    h1 { font-size: 20px; font-weight: 800; color: #111; margin-bottom: 6px; line-height: 1.3; }
    .product-name {
      font-size: 15px; font-weight: 700; color: #03C75A;
      margin-bottom: 6px;
    }
    .sub { font-size: 14px; color: #888; margin-bottom: 14px; line-height: 1.6; }
    .guide {
      background: #fff8e6;
      border: 1.5px solid #ffe082;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 20px;
      text-align: left;
    }
    .guide-title { font-size: 13px; font-weight: 800; color: #b8860b; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .guide-step { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; padding: 4px 0; line-height: 1.4; }
    .guide-step .num {
      min-width: 20px; height: 20px;
      background: #03C75A; color: #fff;
      border-radius: 50%;
      font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(4px); } }
    .arrow { display: block; font-size: 24px; animation: bounce 1.2s ease-in-out infinite; margin: 0 auto 14px; }
    @keyframes pulse {
      0% { box-shadow: 0 4px 16px rgba(3,199,90,0.4); }
      50% { box-shadow: 0 4px 28px rgba(3,199,90,0.7); }
      100% { box-shadow: 0 4px 16px rgba(3,199,90,0.4); }
    }
    .btn-main {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 18px 20px;
      background: #03C75A; color: #fff;
      font-size: 17px; font-weight: 800;
      border: none; border-radius: 14px; cursor: pointer;
      text-decoration: none;
      animation: pulse 2s ease-in-out infinite;
      transition: transform 0.1s;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }
    .btn-main:active { transform: scale(0.98); }
    .btn-main .icon { font-size: 22px; }
    .btn-sub {
      display: block; width: 100%; padding: 14px;
      background: #f2f2f2; color: #666;
      font-size: 14px; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer;
      text-decoration: none;
    }
    .btn-sub:active { background: #e8e8e8; }
    .error {
      padding: 20px; color: #e53935;
      font-size: 15px; font-weight: 700;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="naver-logo">N</div>
  <h1>상품 페이지 열기</h1>
  <div class="product-name" id="productName"></div>
  <p class="sub">아래 버튼을 눌러 네이버에서<br>바로 구매할 수 있어요!</p>



  <span class="arrow">👇</span>

  <a class="btn-main" id="btnMain" href="#">
    <span class="icon">🛍</span>
    <span>네이버에서 상품 보기</span>
  </a>

  <div class="error" id="errorMsg" style="display:none">상품을 찾을 수 없습니다.</div>
</div>

<script>
// ── 상품 링크 목록 ─────────────────────────────────────────────────
var PRODUCTS = {
  '1':  { name: '몽벨 선글라스',        url: 'https://mkt.shopping.naver.com/link/693142a0f546936bc0c3fcd3' },
  '2':  { name: '빔즈 시계',            url: 'https://mkt.shopping.naver.com/link/68d393d834805940cb838150' },
  '3':  { name: '몽벨 쉴드 선글라스',   url: 'https://mkt.shopping.naver.com/link/6a15472bdf17c75a2b47f875' },
  '4':  { name: '몽벨 토트백',          url: 'https://mkt.shopping.naver.com/link/6a33932bcaf98b0660e67ff9' },
  '5':  { name: '베이프꼼데 티셔츠',    url: 'https://mkt.shopping.naver.com/link/6a0c0758bd73e246cdbc5b9e' },
  '6':  { name: '몽벨 데이팩',          url: 'https://mkt.shopping.naver.com/link/69a10652ab81d27bddc3c01f' },
  '7':  { name: '몽벨 숄더백',          url: 'https://mkt.shopping.naver.com/link/69363eea5d310c6863774cde' },
  '8':  { name: '휴먼메이드 카드지갑',  url: 'https://mkt.shopping.naver.com/link/69df62318729e7407cfaaa80' },
  '9':  { name: '빔즈 카드지갑',        url: 'https://mkt.shopping.naver.com/link/6a3b5eb3bb3426556b4189b2' },
  '10': { name: '몽벨 ZIP지갑',         url: 'https://mkt.shopping.naver.com/link/699fdb1466c73256cd59ec36' },
  '11': { name: '몽벨 UL 모노 파우치', url: 'https://smartstore.naver.com/highqual_japan/products/13132629013' },
};
// ──────────────────────────────────────────────────────────────────

var params  = new URLSearchParams(window.location.search);
var pNum    = params.get('p') || '1';
var product = PRODUCTS[pNum];

if (!product) {
  document.getElementById('errorMsg').style.display = 'block';
  document.getElementById('btnMain').style.display  = 'none';
  document.getElementById('btnSub').style.display   = 'none';
} else {
  var STORE_URL = product.url;
  document.getElementById('productName').textContent = '📦 ' + product.name;

  var ua        = navigator.userAgent.toLowerCase();
  var isAndroid = /android/.test(ua);
  var urlPath   = STORE_URL.replace('https://', '');

  var CHROME_INTENT =
    'intent://' + urlPath +
    '#Intent' +
    ';scheme=https' +
    ';package=com.android.chrome' +
    ';S.browser_fallback_url=' + encodeURIComponent(STORE_URL) +
    ';end';

  // iOS: x-safari 스킴으로 사파리 강제 실행
  var IOS_SAFARI = 'x-safari-' + STORE_URL;

  var isIOS = /iphone|ipad|ipod/.test(ua);

  document.getElementById('btnMain').href = isAndroid ? CHROME_INTENT : (isIOS ? IOS_SAFARI : STORE_URL);
}
</script>

</body>
</html>
