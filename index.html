<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상품 페이지로 이동 중...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #03C75A;
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 36px 28px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .naver-logo {
      width: 56px; height: 56px;
      background: #03C75A;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 30px; font-weight: 900; color: #fff;
    }
    h1 {
      font-size: 20px; font-weight: 800; color: #111;
      margin-bottom: 6px; line-height: 1.3;
    }
    .sub {
      font-size: 14px; color: #888; margin-bottom: 28px; line-height: 1.6;
    }

    /* 메인 CTA 버튼 - 크고 강조 */
    .btn-main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%; padding: 18px 20px;
      background: #03C75A;
      color: #fff;
      font-size: 17px; font-weight: 800;
      border: none; border-radius: 14px; cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(3,199,90,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }
    .btn-main:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(3,199,90,0.3);
    }
    .btn-main .icon { font-size: 22px; }

    /* 보조 버튼 */
    .btn-sub {
      display: block; width: 100%; padding: 14px;
      background: #f2f2f2; color: #666;
      font-size: 14px; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-sub:active { background: #e8e8e8; }

    /* 화살표 애니메이션 */
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }
    .arrow {
      display: block;
      font-size: 24px;
      animation: bounce 1.2s ease-in-out infinite;
      margin: 0 auto 14px;
    }

    /* 안내 박스 */
    .guide {
      background: #fff8e6;
      border: 1.5px solid #ffe082;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 20px;
      text-align: left;
    }
    .guide-title {
      font-size: 13px; font-weight: 800; color: #b8860b;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 5px;
    }
    .guide-step {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: #555;
      padding: 4px 0;
      line-height: 1.4;
    }
    .guide-step .num {
      min-width: 20px; height: 20px;
      background: #03C75A; color: #fff;
      border-radius: 50%;
      font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }

    /* 펄스 효과 */
    @keyframes pulse {
      0% { box-shadow: 0 4px 16px rgba(3,199,90,0.4); }
      50% { box-shadow: 0 4px 28px rgba(3,199,90,0.7); }
      100% { box-shadow: 0 4px 16px rgba(3,199,90,0.4); }
    }
    .btn-main { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>

<div class="card">
  <div class="naver-logo">N</div>
  <h1>상품 페이지 열기</h1>
  <p class="sub">아래 버튼을 눌러 네이버에서<br>바로 구매할 수 있어요!</p>

  <div class="guide">
    <div class="guide-title">⚡ 1초만에 구매하는 방법</div>
    <div class="guide-step">
      <span class="num">1</span>
      <span>아래 <strong>초록 버튼</strong> 누르기</span>
    </div>
    <div class="guide-step">
      <span class="num">2</span>
      <span>네이버에서 <strong>로그인 없이</strong> 바로 구매!</span>
    </div>
  </div>

  <span class="arrow">👇</span>

  <a class="btn-main" id="btnMain" href="#">
    <span class="icon">🛍</span>
    <span>네이버에서 상품 보기</span>
  </a>

  <a class="btn-sub" id="btnSub" href="#">앱 없이 브라우저로 열기</a>
</div>

<script>
// ── 상품 링크 목록 (여기에 추가하세요) ───────────────────
var PRODUCTS = {
  '1': 'https://smartstore.naver.com/highqual_japan/products/12454569432',
  // '2': 'https://smartstore.naver.com/highqual_japan/products/XXXXXXXXX',
  // '3': 'https://smartstore.naver.com/highqual_japan/products/XXXXXXXXX',
};
// ─────────────────────────────────────────────────────────

var params    = new URLSearchParams(window.location.search);
var pNum      = params.get('p') || '1';
var STORE_URL = PRODUCTS[pNum] || PRODUCTS['1'];

var ua        = navigator.userAgent.toLowerCase();
var isAndroid = /android/.test(ua);
var isIOS     = /iphone|ipad|ipod/.test(ua);
var urlPath   = STORE_URL.replace('https://', '');

// 안드로이드: Intent URL로 크롬 강제 실행
var CHROME_INTENT =
  'intent://' + urlPath +
  '#Intent' +
  ';scheme=https' +
  ';package=com.android.chrome' +
  ';S.browser_fallback_url=' + encodeURIComponent(STORE_URL) +
  ';end';

// iOS: 사파리로 열기
var IOS_SAFARI = STORE_URL;

document.getElementById('btnMain').href  = isAndroid ? CHROME_INTENT : IOS_SAFARI;
document.getElementById('btnSub').href   = STORE_URL;
</script>

</body>
</html>
